<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 - Konghei</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ===== 赛博朋克背景 ===== */
    .blog-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .blog-bg-layer1 {
      position: absolute; inset: 0;
      background:
        /* 主霓虹光晕 */
        radial-gradient(ellipse 800px 500px at 10% 30%, rgba(167,139,250,0.2), transparent 60%),
        radial-gradient(ellipse 600px 400px at 80% 15%, rgba(34,211,238,0.15), transparent 60%),
        radial-gradient(ellipse 500px 350px at 50% 60%, rgba(232,121,249,0.18), transparent 55%),
        radial-gradient(ellipse 400px 600px at 90% 70%, rgba(251,191,36,0.08), transparent 50%),
        radial-gradient(ellipse 300px 300px at 30% 80%, rgba(34,211,238,0.1), transparent 50%),
        linear-gradient(180deg, #030318 0%, #08061e 30%, #0a0722 60%, #060415 100%);
    }
    .blog-bg-grid {
      position: absolute; bottom: -15%; left: -5%; right: -5%; height: 50%;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(167,139,250,0.08) 2px, rgba(167,139,250,0.08) 3px),
        repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(34,211,238,0.06) 50px, rgba(34,211,238,0.06) 51px);
      mask-image: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
      transform: perspective(600px) rotateX(50deg);
      transform-origin: center bottom;
      animation: gridPulse 4s ease-in-out infinite alternate;
    }
    @keyframes gridPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .blog-bg-scan {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(167,139,250,0.03) 3px, rgba(167,139,250,0.03) 4px);
    }
    /* 粒子层 1 - 大光点 */
    .blog-bg-particles {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(3px 3px at 8% 25%, rgba(232,121,249,0.7), transparent),
        radial-gradient(2px 2px at 18% 55%, rgba(34,211,238,0.8), transparent),
        radial-gradient(4px 4px at 28% 12%, rgba(167,139,250,0.6), transparent),
        radial-gradient(2px 2px at 38% 70%, rgba(251,191,36,0.7), transparent),
        radial-gradient(3px 3px at 48% 22%, rgba(34,211,238,0.8), transparent),
        radial-gradient(2px 2px at 58% 48%, rgba(232,121,249,0.6), transparent),
        radial-gradient(4px 4px at 68% 78%, rgba(167,139,250,0.7), transparent),
        radial-gradient(2px 2px at 78% 30%, rgba(34,211,238,0.8), transparent),
        radial-gradient(3px 3px at 88% 60%, rgba(232,121,249,0.6), transparent),
        radial-gradient(2px 2px at 95% 8%, rgba(167,139,250,0.7), transparent);
      animation: particleSlow 15s ease-in-out infinite alternate;
    }
    /* 粒子层 2 - 小光点密集 */
    .blog-bg-dust {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 3% 20%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 8% 45%, rgba(167,139,250,0.4), transparent),
        radial-gradient(1px 1px at 12% 70%, rgba(34,211,238,0.5), transparent),
        radial-gradient(1px 1px at 17% 15%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 22% 55%, rgba(232,121,249,0.5), transparent),
        radial-gradient(1px 1px at 27% 85%, rgba(167,139,250,0.4), transparent),
        radial-gradient(1px 1px at 33% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 38% 40%, rgba(34,211,238,0.4), transparent),
        radial-gradient(1px 1px at 43% 65%, rgba(232,121,249,0.5), transparent),
        radial-gradient(1px 1px at 48% 90%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 53% 20%, rgba(167,139,250,0.5), transparent),
        radial-gradient(1px 1px at 58% 50%, rgba(34,211,238,0.4), transparent),
        radial-gradient(1px 1px at 63% 75%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 68% 5%, rgba(232,121,249,0.4), transparent),
        radial-gradient(1px 1px at 73% 35%, rgba(167,139,250,0.5), transparent),
        radial-gradient(1px 1px at 78% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 83% 80%, rgba(34,211,238,0.5), transparent),
        radial-gradient(1px 1px at 88% 15%, rgba(232,121,249,0.4), transparent),
        radial-gradient(1px 1px at 93% 45%, rgba(167,139,250,0.5), transparent),
        radial-gradient(1px 1px at 97% 70%, rgba(255,255,255,0.4), transparent);
      animation: particleDrift 12s linear infinite;
    }
    /* 粒子层 3 - 闪烁星点 */
    .blog-bg-sparkle {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(2px 2px at 10% 35%, rgba(34,211,238,0.9), transparent),
        radial-gradient(2px 2px at 30% 10%, rgba(232,121,249,0.8), transparent),
        radial-gradient(2px 2px at 50% 55%, rgba(167,139,250,0.9), transparent),
        radial-gradient(2px 2px at 70% 25%, rgba(34,211,238,0.8), transparent),
        radial-gradient(2px 2px at 85% 65%, rgba(232,121,249,0.9), transparent),
        radial-gradient(2px 2px at 15% 75%, rgba(251,191,36,0.7), transparent),
        radial-gradient(2px 2px at 40% 80%, rgba(34,211,238,0.8), transparent),
        radial-gradient(2px 2px at 60% 15%, rgba(167,139,250,0.9), transparent);
      animation: sparkle 3s ease-in-out infinite alternate;
    }
    @keyframes particleDrift {
      from { transform: translateY(0); }
      to { transform: translateY(-30px); }
    }
    @keyframes particleSlow {
      0% { transform: translate(0, 0); opacity: 0.6; }
      50% { transform: translate(-10px, -15px); opacity: 1; }
      100% { transform: translate(5px, -5px); opacity: 0.7; }
    }
    @keyframes sparkle {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    /* 霓虹电路线条 */
    .blog-bg-circuit {
      position: absolute; inset: 0; pointer-events: none;
    }
    .blog-bg-circuit::before {
      content: "";
      position: absolute; bottom: 25%; left: 3%;
      width: 60px; height: 60px;
      border-left: 1px solid rgba(34,211,238,0.2);
      border-bottom: 1px solid rgba(34,211,238,0.2);
      border-right: 1px solid transparent;
      border-top: 1px solid transparent;
      border-radius: 0 0 0 4px;
      box-shadow: -1px 1px 8px rgba(34,211,238,0.15);
      animation: circuitPulse 4s ease-in-out infinite alternate;
    }
    .blog-bg-circuit::after {
      content: "";
      position: absolute; bottom: 40%; right: 12%;
      width: 40px; height: 30px;
      border-left: 1px solid rgba(232,121,249,0.25);
      border-top: 1px solid rgba(232,121,249,0.25);
      border-bottom: 1px solid transparent;
      border-right: 1px solid transparent;
      border-radius: 0 4px 0 0;
      box-shadow: -1px -1px 8px rgba(232,121,249,0.15);
      animation: circuitPulse 3.5s ease-in-out 0.8s infinite alternate;
    }
    /* 电路节点 */
    .blog-bg-node1, .blog-bg-node2, .blog-bg-node3 {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      box-shadow: 0 0 6px currentColor, 0 0 12px currentColor;
    }
    .blog-bg-node1 { bottom: calc(25% - 2px); left: calc(3% - 2px); color: rgba(34,211,238,0.7); animation: nodeGlow 2s ease-in-out infinite alternate; }
    .blog-bg-node2 { bottom: calc(40% - 2px); right: calc(12% - 2px); color: rgba(232,121,249,0.7); animation: nodeGlow 2.5s ease-in-out 0.5s infinite alternate; }
    .blog-bg-node3 { top: 20%; left: 8%; position: absolute; width: 3px; height: 3px; border-radius: 50%; color: rgba(167,139,250,0.6); box-shadow: 0 0 8px rgba(167,139,250,0.5), 0 0 16px rgba(167,139,250,0.2); animation: nodeGlow 3s ease-in-out 1s infinite alternate; }
    @keyframes circuitPulse {
      0% { opacity: 0.3; }
      100% { opacity: 0.8; }
    }
    @keyframes nodeGlow {
      0% { transform: scale(0.8); opacity: 0.4; }
      100% { transform: scale(1.4); opacity: 1; }
    }

    /* 故障闪烁动画 */
    @keyframes glitch1 {
      0%, 100% { transform: translate(0); }
      5% { transform: translate(-1px, 1px); }
      10% { transform: translate(1px, -1px); }
      15% { transform: translate(0); }
    }
    @keyframes glitchText {
      0%, 95%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(167,139,250,0.3), 0 0 20px rgba(232,121,249,0.15); }
      96% { opacity: 0.8; text-shadow: 2px 0 rgba(34,211,238,0.6), -2px 0 rgba(232,121,249,0.6); }
      97% { opacity: 1; text-shadow: -1px 0 rgba(34,211,238,0.4); }
      98% { opacity: 0.9; text-shadow: 1px 0 rgba(232,121,249,0.4); }
    }
    .screen-tag { animation: glitchText 5s ease-in-out infinite; }

    /* 标题区右侧装饰 */
    .screen-header { position: relative; }
    .header-deco {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      display: flex; align-items: center; gap: 8px;
      font-family: "Consolas","Courier New",monospace;
      opacity: 0.7;
    }
    .header-deco:hover { opacity: 1; }
    .deco-status {
      font-size: 1rem; color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(34,211,238,0.5);
      animation: nodeGlow 2s ease-in-out infinite alternate;
    }
    .deco-text {
      font-size: 0.65rem; letter-spacing: 2px; color: var(--text-dim);
      text-shadow: 0 0 6px rgba(255,255,255,0.1);
    }
    .deco-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e, 0 0 12px rgba(34,197,94,0.5);
      animation: dotLive 1.5s ease-in-out infinite alternate;
    }
    @keyframes dotLive {
      0% { box-shadow: 0 0 4px #22c55e, 0 0 8px rgba(34,197,94,0.3); }
      100% { box-shadow: 0 0 10px #22c55e, 0 0 20px rgba(34,197,94,0.6); }
    }
    .deco-online {
      font-size: 0.6rem; letter-spacing: 3px; color: #22c55e;
      text-shadow: 0 0 6px rgba(34,197,94,0.4);
      animation: glitchText 5s ease-in-out infinite;
    }
    @media (max-width: 900px) {
      .header-deco { display: none; }
    }
    /* 霓虹光环 */
    .blog-bg-ring {
      position: absolute; width: 300px; height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(34,211,238,0.15);
      box-shadow: 0 0 30px rgba(34,211,238,0.1), inset 0 0 30px rgba(34,211,238,0.05);
      top: 50%; right: -80px;
      transform: translateY(-50%);
      animation: ringPulse 4s ease-in-out infinite alternate;
    }
    .blog-bg-ring::after {
      content: "";
      position: absolute; inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(232,121,249,0.08);
      box-shadow: 0 0 20px rgba(232,121,249,0.06);
      animation: ringPulse 4s ease-in-out 1s infinite alternate;
    }
    @keyframes ringPulse {
      0% { opacity: 0.4; box-shadow: 0 0 20px rgba(34,211,238,0.08), inset 0 0 20px rgba(34,211,238,0.03); }
      100% { opacity: 1; box-shadow: 0 0 50px rgba(34,211,238,0.2), inset 0 0 50px rgba(34,211,238,0.08); }
    }

    /* ===== 侧栏增强 ===== */
    .sidebar-card {
      background: rgba(15,13,30,0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.06);
      border-top: 1px solid rgba(167,139,250,0.2);
      border-radius: var(--radius);
      padding: 20px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .sidebar-card::before {
      content: "";
      position: absolute; top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.4), rgba(34,211,238,0.3), transparent);
    }
    .sidebar-card:hover {
      border-color: rgba(167,139,250,0.3);
      box-shadow: 0 0 30px rgba(167,139,250,0.08);
    }
    .sidebar-card h4 {
      font-size: 0.75rem; letter-spacing: 3px;
      color: var(--neon-purple);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
      text-shadow: 0 0 10px rgba(167,139,250,0.3);
    }
    .sidebar-tag {
      padding: 4px 12px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; font-size: 0.78rem; cursor: pointer;
      color: var(--text-dim); background: rgba(255,255,255,0.02);
      transition: all 0.2s; font-family: inherit;
    }
    .sidebar-tag:hover {
      border-color: rgba(232,121,249,0.6); color: #fff;
      background: rgba(232,121,249,0.12);
      box-shadow: 0 0 16px rgba(232,121,249,0.2);
    }

    /* ===== 双栏布局 ===== */
    .sub-page {
      position: relative; z-index: 2;
      min-height: 100vh;
      padding: calc(var(--topbar-h) + 32px) 40px 60px;
      max-width: 1200px;
    }
    .blog-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 36px;
      align-items: start;
    }
    .blog-main { min-width: 0; }
    .blog-sidebar {
      position: sticky; top: calc(var(--topbar-h) + 24px);
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ===== 亚克力玻璃卡片 ===== */
    .card {
      background: rgba(15,13,30,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius); padding: 20px 24px;
      transition: all 0.3s ease; position: relative;
    }
    .card:hover {
      border-color: rgba(167,139,250,0.45);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(167,139,250,0.12), 0 0 100px rgba(232,121,249,0.06);
      transform: translateY(-2px);
    }
    .tl-card {
      border-left: 3px solid var(--tag-accent, var(--border));
      background: rgba(15,13,30,0.5);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* ===== 侧栏卡片 ===== */
    .sidebar-card {
      background: rgba(15,13,30,0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.3s;
    }
    .sidebar-card:hover {
      border-color: rgba(167,139,250,0.25);
    }
    .sidebar-card h4 {
      font-size: 0.75rem; letter-spacing: 3px; color: var(--text-dim);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
    }
    .sidebar-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .sidebar-tag {
      padding: 4px 12px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; font-size: 0.78rem; cursor: pointer;
      color: var(--text-dim); background: rgba(255,255,255,0.02);
      transition: all 0.2s; font-family: inherit;
    }
    .sidebar-tag:hover {
      border-color: var(--neon-purple); color: var(--neon-purple);
      background: rgba(167,139,250,0.1);
    }
    .sidebar-posts { display: flex; flex-direction: column; gap: 12px; }
    .sidebar-post-item {
      cursor: pointer; padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: color 0.2s;
    }
    .sidebar-post-item:last-child { border-bottom: none; }
    .sidebar-post-item:hover { color: var(--neon-purple); }
    .sidebar-post-item .sp-title {
      font-size: 0.9rem; font-weight: 500; margin-bottom: 2px;
    }
    .sidebar-post-item .sp-date {
      font-size: 0.72rem; color: var(--text-dim);
    }

    /* ===== 原有博客组件（保持） ===== */
    .fab-add { position: fixed; bottom: 28px; right: 28px; z-index: 1001; width: 50px; height: 50px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); color: #fff; font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 24px var(--neon-purple-soft); transition: all 0.3s ease; display: none; align-items: center; justify-content: center; }
    .fab-add.visible { display: flex; }
    .fab-add:hover { transform: scale(1.1); box-shadow: 0 8px 36px rgba(167,139,250,0.3); }
    .unlock-btn { position: fixed; bottom: 28px; right: 88px; z-index: 1001; background: none; border: none; color: var(--text-dim); font-size: 1rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
    .unlock-btn:hover, .unlock-btn.unlocked { opacity: 1; color: var(--warm-amber); }
    .editor-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(6,6,14,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .editor-overlay.open { opacity: 1; visibility: visible; }
    .editor-panel { background: rgba(18,16,36,0.95); border: 1px solid rgba(167,139,250,0.2); border-radius: var(--radius); padding: 32px; width: 90%; max-width: 720px; max-height: 85vh; overflow-y: auto; backdrop-filter: blur(20px); }
    .editor-panel h2 { margin-bottom: 24px; }
    .editor-field { margin-bottom: 20px; }
    .editor-field label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; }
    .editor-field input, .editor-field textarea, .editor-field select { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); background: rgba(10,10,24,0.8); color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; resize: vertical; transition: border-color 0.2s; }
    .editor-field input:focus, .editor-field textarea:focus, .editor-field select:focus { border-color: var(--neon-purple); }
    .editor-field textarea { min-height: 280px; font-family: "Consolas","Courier New",monospace; font-size: 0.9rem; line-height: 1.7; }
    .editor-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel { padding: 10px 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
    .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-publish { padding: 10px 24px; border: none; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); color: #fff; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
    .btn-publish:hover { box-shadow: 0 4px 20px var(--neon-purple-soft); }
    .fab-export { position: fixed; bottom: 90px; right: 28px; z-index: 1001; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--warm-amber); background: var(--warm-amber-soft); color: var(--warm-amber); font-size: 0.82rem; cursor: pointer; font-family: inherit; font-weight: 600; display: none; transition: all 0.2s; }
    .fab-export.visible { display: block; }
    .fab-export:hover { background: rgba(251,191,36,0.2); }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 3000; padding: 10px 24px; border-radius: 20px; background: var(--surface); border: 1px solid var(--neon-purple); color: var(--text); font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .user-post .tl-card { position: relative; }
    .post-actions { position: absolute; top: 10px; right: 14px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
    .user-post:hover .post-actions { opacity: 1; }
    .btn-edit-post, .btn-del-post { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); transition: color 0.2s; }
    .btn-edit-post:hover { color: var(--neon-purple); }
    .btn-del-post:hover { color: #f87171; }
    .pw-dialog { position: fixed; bottom: 80px; right: 28px; z-index: 1002; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: none; flex-direction: column; gap: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .pw-dialog.open { display: flex; }
    .pw-dialog input { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #0a0a18; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none; }
    .pw-dialog input:focus { border-color: var(--neon-purple); }
    .pw-dialog button { padding: 6px 16px; border: none; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); color: #fff; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 600; }
    .pw-error { color: #f87171; font-size: 0.78rem; display: none; }
    .tag-filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .tag-filter-btn { padding: 6px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; background: rgba(15,13,30,0.5); backdrop-filter: blur(10px); color: var(--text-dim); font-size: 0.82rem; cursor: pointer; font-family: inherit; transition: all 0.25s; }
    .tag-filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
