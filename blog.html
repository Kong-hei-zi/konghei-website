<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 - Konghei</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 写文章按钮 */
    .fab-add {
      position: fixed; bottom: 28px; right: 28px; z-index: 1001;
      width: 50px; height: 50px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      color: #fff; font-size: 1.6rem; cursor: pointer;
      box-shadow: 0 4px 24px var(--neon-purple-soft);
      transition: all 0.3s ease; display: none; align-items: center; justify-content: center;
    }
    .fab-add.visible { display: flex; }
    .fab-add:hover { transform: scale(1.1); box-shadow: 0 8px 36px rgba(167,139,250,0.3); }

    /* 解锁编辑按钮 */
    .unlock-btn {
      position: fixed; bottom: 28px; right: 88px; z-index: 1001;
      background: none; border: none; color: var(--text-dim); font-size: 1rem;
      cursor: pointer; opacity: 0.4; transition: opacity 0.2s;
    }
    .unlock-btn:hover, .unlock-btn.unlocked { opacity: 1; color: var(--warm-amber); }

    /* 编辑器遮罩 */
    .editor-overlay {
      position: fixed; inset: 0; z-index: 2000; background: rgba(6,6,14,0.85);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .editor-overlay.open { opacity: 1; visibility: visible; }

    .editor-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; width: 90%; max-width: 640px;
      max-height: 85vh; overflow-y: auto;
    }
    .editor-panel h2 { margin-bottom: 24px; }

    .editor-field { margin-bottom: 20px; }
    .editor-field label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; }
    .editor-field input, .editor-field textarea, .editor-field select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: #0a0a18; color: var(--text);
      font-size: 0.95rem; font-family: inherit; outline: none; resize: vertical;
      transition: border-color 0.2s;
    }
    .editor-field input:focus, .editor-field textarea:focus, .editor-field select:focus { border-color: var(--neon-purple); }
    .editor-field textarea { min-height: 200px; font-family: "Consolas","Courier New",monospace; font-size: 0.9rem; line-height: 1.7; }

    .editor-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel { padding: 10px 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
    .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-publish { padding: 10px 24px; border: none; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); color: #fff; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
    .btn-publish:hover { box-shadow: 0 4px 20px var(--neon-purple-soft); }

    /* 导出按钮 */
    .fab-export {
      position: fixed; bottom: 90px; right: 28px; z-index: 1001;
      padding: 8px 16px; border-radius: 20px; border: 1px solid var(--warm-amber);
      background: var(--warm-amber-soft); color: var(--warm-amber);
      font-size: 0.82rem; cursor: pointer; font-family: inherit; font-weight: 600;
      display: none; transition: all 0.2s;
    }
    .fab-export.visible { display: block; }
    .fab-export:hover { background: rgba(251,191,36,0.2); }

    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 3000;
      padding: 10px 24px; border-radius: 20px; background: var(--surface);
      border: 1px solid var(--neon-purple); color: var(--text);
      font-size: 0.9rem; opacity: 0; transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }

    /* 用户文章的编辑/删除按钮 */
    .user-post .tl-card { position: relative; }
    .post-actions { position: absolute; top: 10px; right: 14px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
    .user-post:hover .post-actions { opacity: 1; }
    .btn-edit-post, .btn-del-post { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); transition: color 0.2s; }
    .btn-edit-post:hover { color: var(--neon-purple); }
    .btn-del-post:hover { color: #f87171; }

    /* 密码弹窗 */
    .pw-dialog {
      position: fixed; bottom: 80px; right: 28px; z-index: 1002;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; display: none; flex-direction: column; gap: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .pw-dialog.open { display: flex; }
    .pw-dialog input {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: #0a0a18; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none;
    }
    .pw-dialog input:focus { border-color: var(--neon-purple); }
    .pw-dialog button {
      padding: 6px 16px; border: none; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      color: #fff; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 600;
    }
    .pw-error { color: #f87171; font-size: 0.78rem; display: none; }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="tb-logo" href="index.html">Konghei</a>
    <nav class="tb-nav">
      <a class="tb-btn" href="index.html"><span class="tb-en">INDEX</span><span class="tb-cn">首页</span></a>
      <a class="tb-btn active" href="blog.html"><span class="tb-en">BLOG</span><span class="tb-cn">博客</span></a>
      <a class="tb-btn" href="portfolio.html"><span class="tb-en">WORKS</span><span class="tb-cn">作品集</span></a>
      <a class="tb-btn" href="shop.html"><span class="tb-en">SHOP</span><span class="tb-cn">小店</span></a>
      <a class="tb-btn" href="notes.html"><span class="tb-en">NOTES</span><span class="tb-cn">学习笔记</span></a>
    </nav>
    <div class="tb-extra"><span class="tb-doll">🧸</span></div>
  </header>

  <main class="sub-page">
    <div class="screen-header">
      <div class="screen-tag">CHRONICLE // 时间轴</div>
      <h2 class="screen-title"><span class="st-en">BLOG</span><span class="st-cn">博客</span></h2>
      <p class="screen-desc">记录思考，分享知识</p>
    </div>
    <div id="content-root"></div>
  </main>

  <!-- 锁定/解锁按钮 -->
  <button class="unlock-btn" id="unlock-btn" title="解锁编辑">🔒</button>

  <!-- 密码弹窗 -->
  <div class="pw-dialog" id="pw-dialog">
    <input type="password" id="pw-input" placeholder="输入编辑密码...">
    <button id="pw-confirm">解锁</button>
    <span class="pw-error" id="pw-error">密码错误</span>
  </div>

  <!-- 发布按钮 -->
  <button class="fab-export" id="fab-export" title="一键发布到 content.js">📤 发布</button>

  <!-- 写文章按钮 -->
  <button class="fab-add" id="fab-add" title="写文章">+</button>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- 编辑器 -->
  <div class="editor-overlay" id="editor-overlay">
    <div class="editor-panel">
      <h2 id="editor-title">✏️ 写文章</h2>
      <div class="editor-field">
        <label>标题</label>
        <input id="ed-title" type="text" placeholder="文章标题...">
      </div>
      <div class="editor-field">
        <label>摘要</label>
        <input id="ed-summary" type="text" placeholder="一句话概括...">
      </div>
      <div class="editor-field">
        <label>标签</label>
        <select id="ed-tag">
          <option value="随笔">随笔</option><option value="Web开发">Web开发</option>
          <option value="教程">教程</option><option value="Python">Python</option>
          <option value="考研">考研</option><option value="金融">金融</option>
        </select>
      </div>
      <div class="editor-field">
        <label>正文（支持 HTML）</label>
        <textarea id="ed-body" placeholder="开始写...

提示：
&lt;h2&gt;小标题&lt;/h2&gt;
&lt;p&gt;段落&lt;/p&gt;
&lt;strong&gt;加粗&lt;/strong&gt;"></textarea>
      </div>
      <div class="editor-actions">
        <button class="btn-cancel" id="btn-cancel">取消</button>
        <button class="btn-publish" id="btn-publish">发布</button>
      </div>
    </div>
  </div>

  <script src="content.js"></script>
  <script>
    (function() {
      var c = document.getElementById('content-root');
      if (!c || !SITE || !SITE.blog) return;

      var USER_KEY = 'konghei_user_blog';
      var AUTH_KEY = 'konghei_blog_authed';
      var EDIT_PWD = 'konghei2026';
      var editingId = null;

      function h(t,a,k){var e=document.createElement(t);if(a)Object.keys(a).forEach(function(p){if(p==='className')e.className=a[p];else if(p==='innerHTML')e.innerHTML=a[p];else if(p==='dataset')Object.assign(e.dataset,a[p]);else e.setAttribute(p,a[p])});if(k){if(typeof k==='string')e.textContent=k;else if(Array.isArray(k))k.forEach(function(x){if(x)e.appendChild(x)});else e.appendChild(k)}return e}

      function getUserPosts() {
        var posts = [];
        try { posts = JSON.parse(localStorage.getItem(USER_KEY)) || []; } catch(e) {}
        /* 检查 content.js 的种子文章是否已导入，没有就补上 */
        var hasSeeds = posts.some(function(p) { return p.id && p.id.startsWith('seed-'); });
        if (!hasSeeds && SITE.blog.length) {
          var seeds = SITE.blog.map(function(p, i) {
            return { id: 'seed-' + i, date: p.date, title: p.title, summary: p.summary, tag: p.tag, body: p.body };
          });
          posts = seeds.concat(posts);
          saveUserPosts(posts);
        }
        return posts;
      }
      function saveUserPosts(posts) { localStorage.setItem(USER_KEY, JSON.stringify(posts)); }
      function newId() { return 'user-' + Date.now(); }
      function formatDate() {
        var d = new Date();
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }

      var isAuthed = !!sessionStorage.getItem(AUTH_KEY);
      var fab = document.getElementById('fab-add');
      var fabExport = document.getElementById('fab-export');
      var unlockBtn = document.getElementById('unlock-btn');
      var pwDialog = document.getElementById('pw-dialog');

      function setAuthed(v) {
        isAuthed = v;
        if (v) {
          sessionStorage.setItem(AUTH_KEY, '1');
          fab.classList.add('visible');
          fabExport.classList.add('visible');
          unlockBtn.textContent = '🔓';
          unlockBtn.classList.add('unlocked');
          pwDialog.classList.remove('open');
        } else {
          sessionStorage.removeItem(AUTH_KEY);
          fab.classList.remove('visible');
          fabExport.classList.remove('visible');
          unlockBtn.textContent = '🔒';
          unlockBtn.classList.remove('unlocked');
          pwDialog.classList.remove('open');
        }
        render();
      }

      if (isAuthed) { fab.classList.add('visible'); fabExport.classList.add('visible'); unlockBtn.textContent = '🔓'; unlockBtn.classList.add('unlocked'); }

      /* 发布 */
      fabExport.addEventListener('click', function() {
        var posts = getUserPosts();
        if (!posts.length) return;
        var toast = document.getElementById('toast');
        toast.textContent = '⏳ 发布中...';
        toast.classList.add('show');

        fetch('/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(posts)
        }).then(function(r) { return r.json(); }).then(function(d) {
          toast.textContent = '✅ 已发布 ' + d.count + ' 篇文章到 content.js！git push 即上线～';
          setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }).catch(function() {
          toast.textContent = '⚠️ 发布失败！请确认服务器是 python server.py 启动的';
          setTimeout(function() { toast.classList.remove('show'); }, 4000);
        });
      });

      unlockBtn.addEventListener('click', function() {
        if (isAuthed) { setAuthed(false); return; }
        pwDialog.classList.toggle('open');
        if (pwDialog.classList.contains('open')) document.getElementById('pw-input').focus();
      });

      document.getElementById('pw-confirm').addEventListener('click', function() {
        if (document.getElementById('pw-input').value === EDIT_PWD) {
          setAuthed(true);
        } else {
          var err = document.getElementById('pw-error');
          err.style.display = 'block';
          setTimeout(function(){ err.style.display = 'none'; }, 2000);
        }
      });

      document.getElementById('pw-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('pw-confirm').click();
      });

      function render() {
        c.innerHTML = '';
        var allPosts = getUserPosts();

        var lv = h('div',{className:'list-view'});
        var tl = h('div',{className:'timeline'});

        allPosts.forEach(function(p) {
          var isUser = p.id && p.id.startsWith('user-');
          var cls = 'tl-item card-clickable' + (isUser ? ' user-post' : '');

          var card = h('div',{className:'tl-card card'},[
            h('span',{className:'card-date'},p.date),
            h('h3',null,p.title),
            h('p',null,p.summary),
            h('span',{className:'card-tag'},p.tag)
          ]);

          if (isUser && isAuthed) {
            var actions = h('div',{className:'post-actions'},[
              h('button',{className:'btn-edit-post',title:'编辑'},'✎'),
              h('button',{className:'btn-del-post',title:'删除'},'✕')
            ]);
            card.appendChild(actions);
          }

          tl.appendChild(h('article',{className:cls,dataset:{detail:p.id+'-d'}},[h('div',{className:'tl-dot'}),card]));
        });

        lv.appendChild(tl); c.appendChild(lv);

        allPosts.forEach(function(p) {
          c.appendChild(h('div',{id:p.id+'-d',className:'detail-view'},[
            h('button',{className:'btn-back'},'← 返回列表'),
            h('article',{className:'detail-article'},[
              h('span',{className:'card-date'},p.date),
              h('h1',null,p.title),
              h('span',{className:'card-tag'},p.tag),
              h('div',{className:'detail-body',innerHTML:p.body})
            ])
          ]));
        });

        bindEvents(lv);
      }

      function bindEvents(lv) {
        document.querySelectorAll('[data-detail]').forEach(function(card){card.addEventListener('click',function(){var d=document.getElementById(card.dataset.detail);if(d){lv.classList.add('hidden');d.classList.add('active')}})});
        document.querySelectorAll('.btn-back').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();document.querySelectorAll('.detail-view').forEach(function(d){d.classList.remove('active')});lv.classList.remove('hidden')})});

        /* 编辑 */
        document.querySelectorAll('.btn-edit-post').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();
          var postId = btn.closest('[data-detail]').dataset.detail.replace('-d','');
          var posts = getUserPosts();
          var post = posts.find(function(p){return p.id === postId});
          if (!post) return;
          editingId = postId;
          document.getElementById('ed-title').value = post.title;
          document.getElementById('ed-summary').value = post.summary;
          document.getElementById('ed-tag').value = post.tag;
          document.getElementById('ed-body').value = post.body;
          document.getElementById('editor-title').textContent = '✏️ 编辑文章';
          document.getElementById('editor-overlay').classList.add('open');
        })});

        /* 删除 */
        document.querySelectorAll('.btn-del-post').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();
          var postId = btn.closest('[data-detail]').dataset.detail.replace('-d','');
          var posts = getUserPosts().filter(function(p){return p.id !== postId});
          saveUserPosts(posts); render();
        })});

        setTimeout(function(){document.querySelectorAll('.tl-item').forEach(function(el,i){el.style.setProperty('--anim-delay',(i*0.08)+'s');el.classList.add('anim-in')})},200);
      }

      /* 编辑器 */
      var overlay = document.getElementById('editor-overlay');
      var edTitle = document.getElementById('ed-title');
      var edSummary = document.getElementById('ed-summary');
      var edTag = document.getElementById('ed-tag');
      var edBody = document.getElementById('ed-body');

      function clearEditor() {
        edTitle.value = ''; edSummary.value = ''; edBody.value = '';
        editingId = null;
        document.getElementById('editor-title').textContent = '✏️ 写文章';
      }

      fab.addEventListener('click', function() {
        clearEditor();
        overlay.classList.add('open');
        edTitle.focus();
      });

      document.getElementById('btn-cancel').addEventListener('click', function() { overlay.classList.remove('open'); clearEditor(); });
      overlay.addEventListener('click', function(e) { if (e.target === overlay) { overlay.classList.remove('open'); clearEditor(); } });

      document.getElementById('btn-publish').addEventListener('click', function() {
        var title = edTitle.value.trim();
        var body = edBody.value.trim();
        if (!title || !body) return;

        var posts = getUserPosts();

        if (editingId) {
          /* 编辑已有文章 */
          var idx = posts.findIndex(function(p){return p.id === editingId});
          if (idx >= 0) {
            posts[idx].title = title;
            posts[idx].summary = edSummary.value.trim() || title;
            posts[idx].tag = edTag.value;
            posts[idx].body = body;
          }
        } else {
          /* 新文章 */
          posts.unshift({
            id: newId(), date: formatDate(),
            title: title, summary: edSummary.value.trim() || title,
            tag: edTag.value, body: body
          });
        }

        saveUserPosts(posts);
        clearEditor();
        overlay.classList.remove('open');
        render();
      });

      render();
    })();
  </script>
</body>
</html>
